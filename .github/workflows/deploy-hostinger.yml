name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload site files to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          sudo apt-get install -y lftp

          # Build lftp script — heredoc expands $FTP_* vars cleanly, no shell quoting issues
          cat > /tmp/deploy.lftp << EOF
          open -p 21 -u $FTP_USER,$FTP_PASS $FTP_HOST
          set ftp:ssl-allow no
          set net:timeout 60
          set net:max-retries 3
          mirror --reverse --verbose --exclude-rx ^\.git . $FTP_PATH
          bye
          EOF

          lftp -f /tmp/deploy.lftp
