name: Deploy to Hostinger

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/data/org-map.json'   # handled by update-players.yml
      - '.github/**'
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy dist/ via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          sudo apt-get install -y lftp

          cat > /tmp/deploy.lftp << EOF
          open -p 21 -u $FTP_USER,$FTP_PASS $FTP_HOST
          set ftp:ssl-allow no
          set net:timeout 60
          set net:max-retries 3

          # Deploy all code/assets — skip maps/ (695 MB of screenshots already on server)
          mirror --reverse --delete --verbose \
            --exclude '^maps/' \
            dist/ $FTP_PATH

          # Upload only NEW map screenshots — --ignore-time compares by size only,
          # avoiding re-uploads caused by fresh CI timestamps on unchanged files
          mirror --reverse --verbose --ignore-time \
            dist/maps/ $FTP_PATH/maps/

          bye
          EOF

          lftp -f /tmp/deploy.lftp

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee /tmp/cf_purge.json
          grep -q '"success":true' /tmp/cf_purge.json || { echo "Cloudflare purge failed"; cat /tmp/cf_purge.json; exit 1; }
