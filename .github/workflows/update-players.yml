name: Update Player Data

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Manual trigger from the GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to push org-map.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Build org-map.json
        run: python .github/scripts/build_orgmap.py
        env:
          VLRGG_API_URL: ${{ secrets.VLRGG_API_URL }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}

      - name: Commit and push org-map.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add org-map.json
          git diff --staged --quiet && echo "No changes to org-map.json" && exit 0
          git commit -m "chore: update org-map.json"
          git push
