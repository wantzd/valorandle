name: Update Player Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Build public/data/org-map.json
        run: python .github/scripts/build_orgmap.py
        env:
          VLRGG_API_URL: ${{ secrets.VLRGG_API_URL }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}

      - name: Commit public/data/org-map.json to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/org-map.json
          git diff --staged --quiet && echo "No changes to org-map.json" || \
            git commit -m "chore: update org-map.json" && git push

      - name: Upload org-map.json to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          sudo apt-get install -y lftp

          lftp -p 21 -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" << EOF
          set ftp:ssl-allow no
          set net:timeout 60
          set net:max-retries 5
          set net:reconnect-interval-base 5
          mirror --reverse --verbose --ignore-time --include-glob org-map.json public/data/ $FTP_PATH/data/
          bye
          EOF

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee /tmp/cf_purge.json
          grep -q '"success":true' /tmp/cf_purge.json || { echo "Cloudflare purge failed"; cat /tmp/cf_purge.json; exit 1; }
