name: Update Player Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Build public/data/org-map.json
        run: python .github/scripts/build_orgmap.py
        env:
          VLRGG_API_URL: ${{ secrets.VLRGG_API_URL }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}

      - name: Commit public/data/org-map.json to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/org-map.json
          git diff --staged --quiet && echo "No changes to org-map.json" || \
            git commit -m "chore: update org-map.json" && git push
