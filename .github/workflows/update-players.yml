name: Update Player Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Build data/org-map.json
        run: python .github/scripts/build_orgmap.py
        env:
          VLRGG_API_URL: ${{ secrets.VLRGG_API_URL }}
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}

      - name: Commit data/org-map.json to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/org-map.json
          git diff --staged --quiet && echo "No changes to data/org-map.json" || \
            git commit -m "chore: update data/org-map.json" && git push

      - name: Upload data/org-map.json to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          sudo apt-get install -y lftp

          cat > /tmp/upload.lftp << EOF
          open -p 21 -u $FTP_USER,$FTP_PASS $FTP_HOST
          set ftp:ssl-allow no
          set net:timeout 60
          set net:max-retries 3
          put data/org-map.json -o $FTP_PATH/data/org-map.json
          bye
          EOF

          lftp -f /tmp/upload.lftp
